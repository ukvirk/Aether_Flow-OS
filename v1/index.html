<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow OS | Elite Productivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-pulse-slow { animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useReducer } = React;
        
        // MAPPING ALL ICONS FROM YOUR SOURCE
        const { 
            Clock, Plus, Trash2, Check, Moon, Sun, Target, Calendar, Flame, Trophy, 
            PlayCircle, PauseCircle, SkipForward, Award, CheckCircle2, BarChart3, 
            Smile, Meh, Frown, Coffee, CloudRain, Wind, Volume2, Users, Copy, 
            Sparkles, X, BookOpen, Save, Settings, CheckSquare, Heart, TrendingUp, 
            RefreshCw, Zap, CheckCircle 
        } = lucide;

        // --- REDUCERS[cite: 2] ---
        const taskReducer = (state, action) => {
            switch (action.type) {
                case 'SET_TASKS': return action.payload;
                case 'ADD_TASK': return [...state, action.payload];
                case 'TOGGLE_TASK': return state.map(t => t.id === action.payload ? { ...t, completed: !t.completed } : t);
                case 'DELETE_TASK': return state.filter(t => t.id !== action.payload);
                default: return state;
            }
        };

        const habitReducer = (state, action) => {
            switch (action.type) {
                case 'SET_HABITS': return action.payload;
                case 'ADD_HABIT': return [...state, action.payload];
                case 'TOGGLE_HABIT': return state.map(h => h.id === action.payload ? { ...h, completedToday: !h.completedToday, totalCompletions: h.completedToday ? h.totalCompletions - 1 : h.totalCompletions + 1 } : h);
                case 'DELETE_HABIT': return state.filter(h => h.id !== action.payload);
                default: return state;
            }
        };

        // --- COMPONENTS[cite: 2] ---
        const FreeForeverBanner = () => (
            <div className="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-green-400 via-blue-500 to-purple-600 py-2 px-4 text-center shadow-2xl">
                <p className="text-white font-bold text-[10px] md:text-sm flex items-center justify-center gap-2 animate-pulse">
                    <Sparkles className="w-4 h-4" />
                    AetherFlow is 100% Free Forever • No Limits • Full Access
                    <Sparkles className="w-4 h-4" />
                </p>
            </div>
        );

        const ViralConnectModule = ({ userId, isDarkMode }) => {
            const [copied, setCopied] = useState(false);
            const referralLink = `https://aetherflow.app/invite/${userId.substring(0,8)}`;
            
            return (
                <div className={`rounded-xl p-6 shadow-lg border mt-6 ${isDarkMode ? 'bg-gradient-to-br from-purple-900/50 to-pink-900/50 border-purple-700' : 'bg-gradient-to-br from-purple-100 to-pink-100 border-purple-300'}`}>
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center shadow-lg"><Users className="w-6 h-6 text-white" /></div>
                        <div>
                            <h3 className={`text-lg font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'}`}>🚀 Invite Friends</h3>
                            <p className={`text-xs ${isDarkMode ? 'text-gray-300' : 'text-gray-600'}`}>Share & grow together</p>
                        </div>
                    </div>
                    <div className="flex gap-2 p-2 rounded-lg bg-black/20">
                        <input type="text" value={referralLink} readOnly className="bg-transparent text-[10px] flex-1 outline-none text-white" />
                        <button onClick={() => {navigator.clipboard.writeText(referralLink); setCopied(true); setTimeout(()=>setCopied(false), 2000)}} className="bg-white text-black px-3 py-1 rounded-md text-[10px] font-bold">
                            {copied ? 'COPIED!' : 'COPY'}
                        </button>
                    </div>
                </div>
            );
        };

        // --- MAIN APP[cite: 2] ---
        const AetherFlowApp = () => {
            const [userId] = useState("USER-" + Math.random().toString(36).substr(2, 9));
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [tasks, dispatchTasks] = useReducer(taskReducer, []);
            const [habits, dispatchHabits] = useReducer(habitReducer, []);
            const [points, setPoints] = useState(245);
            const [streak, setStreak] = useState(7);
            const [newTask, setNewTask] = useState('');
            const [pomodoroMinutes, setPomodoroMinutes] = useState(25);
            const [pomodoroActive, setPomodoroActive] = useState(false);

            // Pomodoro Logic
            useEffect(() => {
                let interval = null;
                if (pomodoroActive && pomodoroMinutes > 0) {
                    interval = setInterval(() => setPomodoroMinutes(m => m - 1), 60000);
                } else if (pomodoroMinutes === 0) {
                    setPomodoroActive(false);
                    setPoints(p => p + 10);
                }
                return () => clearInterval(interval);
            }, [pomodoroActive, pomodoroMinutes]);

            const renderScreen = () => {
                switch(activeTab) {
                    case 'dashboard': return (
                        <div className="space-y-6 animate-in fade-in duration-700">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-indigo-700 p-6 rounded-3xl shadow-xl flex flex-col items-center">
                                    <CheckSquare className="w-8 h-8 text-white mb-2" />
                                    <span className="text-2xl font-black text-white">{tasks.filter(t => t.completed).length}</span>
                                    <span className="text-xs text-indigo-200">Tasks Done</span>
                                </div>
                                <div className="bg-yellow-600 p-6 rounded-3xl shadow-xl flex flex-col items-center">
                                    <Trophy className="w-8 h-8 text-white mb-2" />
                                    <span className="text-2xl font-black text-white">{points}</span>
                                    <span className="text-xs text-yellow-100">Points</span>
                                </div>
                            </div>
                            <div className={`p-6 rounded-3xl border ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                                <h3 className="font-bold flex items-center gap-2 mb-2"><Sparkles className="text-yellow-400 w-4 h-4"/>Daily Quote</h3>
                                <p className="text-sm italic opacity-70">"The secret of getting ahead is getting started." - Mark Twain</p>
                            </div>
                        </div>
                    );
                    case 'tasks': return (
                        <div className="space-y-4">
                            <div className="flex gap-2">
                                <input value={newTask} onChange={e => setNewTask(e.target.value)} placeholder="Target objective..." className="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500" />
                                <button onClick={() => {if(newTask){dispatchTasks({type:'ADD_TASK', payload:{id:Date.now(), text:newTask, completed:false, priority:'medium'}}); setNewTask('')}}} className="bg-indigo-600 px-4 rounded-xl font-bold"><Plus/></button>
                            </div>
                            {tasks.map(t => (
                                <div key={t.id} className="flex items-center justify-between p-4 bg-gray-800 rounded-2xl border-l-4 border-indigo-500">
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => dispatchTasks({type:'TOGGLE_TASK', payload:t.id})} className={`p-2 rounded-full ${t.completed ? 'bg-green-500' : 'bg-gray-700'}`}><Check className="w-4 h-4"/></button>
                                        <span className={t.completed ? 'line-through opacity-50' : ''}>{t.text}</span>
                                    </div>
                                    <button onClick={() => dispatchTasks({type:'DELETE_TASK', payload:t.id})}><Trash2 className="w-4 h-4 text-red-500/50"/></button>
                                </div>
                            ))}
                        </div>
                    );
                    case 'focus': return (
                        <div className="flex flex-col items-center justify-center pt-10 space-y-8">
                            <div className="w-56 h-56 rounded-full border-8 border-indigo-600/20 flex flex-col items-center justify-center shadow-[0_0_50px_rgba(79,70,229,0.3)]">
                                <span className="text-5xl font-black">{pomodoroMinutes}:00</span>
                                <span className="text-[10px] font-bold tracking-widest text-indigo-400 mt-2">DEEP WORK</span>
                            </div>
                            <button onClick={() => setPomodoroActive(!pomodoroActive)} className="bg-indigo-600 px-12 py-4 rounded-full font-black uppercase tracking-widest shadow-lg shadow-indigo-500/50">
                                {pomodoroActive ? 'Pause' : 'Initialize'}
                            </button>
                        </div>
                    );
                    case 'settings': return (
                        <div className="space-y-6">
                            <div className="bg-gray-800 p-4 rounded-2xl flex justify-between items-center">
                                <span className="font-bold">Dark Protocol</span>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-12 h-6 bg-indigo-600 rounded-full relative">
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${isDarkMode ? 'left-7' : 'left-1'}`} />
                                </button>
                            </div>
                            <ViralConnectModule userId={userId} isDarkMode={isDarkMode} />
                        </div>
                    );
                }
            };

            return (
                <div className={`min-h-screen max-w-md mx-auto p-6 pt-20 pb-32 ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-gray-50 text-slate-900'}`}>
                    <FreeForeverBanner />
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter">AETHER<span className="text-indigo-500">FLOW</span></h1>
                            <p className="text-[10px] font-bold opacity-50 uppercase tracking-widest">Ground Zero Hustler Edition</p>
                        </div>
                        <div className="flex gap-3">
                            <div className="flex items-center text-red-500 font-black"><Flame className="w-4 h-4 mr-1"/>{streak}</div>
                        </div>
                    </header>

                    {renderScreen()}

                    <nav className="fixed bottom-6 left-6 right-6 max-w-md mx-auto bg-gray-900/80 backdrop-blur-lg border border-white/5 rounded-[2.5rem] flex justify-around p-3 shadow-2xl">
                        {[
                            { id: 'dashboard', icon: Calendar },
                            { id: 'tasks', icon: Target },
                            { id: 'focus', icon: Clock },
                            { id: 'settings', icon: Settings }
                        ].map(tab => {
                            const Icon = tab.icon;
                            return (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`p-4 rounded-full transition-all ${activeTab === tab.id ? 'bg-indigo-600 scale-110 shadow-lg shadow-indigo-500/50' : 'text-gray-500'}`}>
                                    <Icon className="w-5 h-5" />
                                </button>
                            );
                        })}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AetherFlowApp />);
    </script>
</body>
</html>
