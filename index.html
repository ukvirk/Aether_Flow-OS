<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow OS | Productivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useReducer } = React;
        const { Zap, Clock, Target, Calendar, Settings, Flame, Trophy, Trash2, CheckSquare } = {
            Zap: () => <span>⚡</span>,
            Clock: () => <span>🕒</span>,
            Target: () => <span>🎯</span>,
            Calendar: () => <span>📅</span>,
            Settings: () => <span>⚙️</span>,
            Flame: () => <span>🔥</span>,
            Trophy: () => <span>🏆</span>,
            Trash2: () => <span>🗑️</span>,
            CheckSquare: () => <span>☑️</span>
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [points, setPoints] = useState(245);
            const [tasks, setTasks] = useState([
                { id: 1, text: "Finish AetherFlow Deployment", completed: false }
            ]);

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto shadow-2xl bg-slate-900">
                    <header className="p-6 border-b border-slate-800 flex justify-between items-center glass">
                        <div className="flex items-center gap-2">
                            <Zap />
                            <h1 className="font-bold text-xl tracking-tight">AetherFlow</h1>
                        </div>
                        <div className="flex gap-4 text-sm font-bold text-sky-400">
                            <span className="flex items-center gap-1"><Trophy /> {points}</span>
                        </div>
                    </header>

                    <main className="flex-grow p-6">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="p-6 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-700 shadow-lg text-center">
                                    <h2 className="text-4xl font-bold mb-1">7d</h2>
                                    <p className="text-xs uppercase tracking-widest opacity-80">Current Streak</p>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass p-4 rounded-xl text-center">
                                        <div className="text-xl font-bold">{tasks.length}</div>
                                        <div className="text-xs opacity-60 uppercase">Pending Tasks</div>
                                    </div>
                                    <div className="glass p-4 rounded-xl text-center border-emerald-500/30">
                                        <div className="text-xl font-bold text-emerald-400">Active</div>
                                        <div className="text-xs opacity-60 uppercase">System Status</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tasks' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold mb-4">Task Architect</h2>
                                {tasks.map(t => (
                                    <div key={t.id} className="glass p-4 rounded-xl flex justify-between items-center border-l-4 border-indigo-500">
                                        <span>{t.text}</span>
                                        <button onClick={() => setTasks([])}><Trash2 /></button>
                                    </div>
                                ))}
                                <p className="text-xs text-slate-500 text-center mt-10">Logic initialized. Ready for input.</p>
                            </div>
                        )}
                    </main>

                    <nav className="glass border-t border-slate-800 p-4 flex justify-around sticky bottom-0">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-sky-400' : 'text-slate-500'}><Calendar /></button>
                        <button onClick={() => setActiveTab('tasks')} className={activeTab === 'tasks' ? 'text-sky-400' : 'text-slate-500'}><Target /></button>
                        <button onClick={() => setActiveTab('focus')} className={activeTab === 'focus' ? 'text-sky-400' : 'text-slate-500'}><Clock /></button>
                        <button onClick={() => setActiveTab('settings')} className={activeTab === 'settings' ? 'text-sky-400' : 'text-slate-500'}><Settings /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
