<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow OS | Productivity Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        // Accessing React from the global window object (Bulletproof Method)
        const { useState, useEffect, useReducer } = React;
        const { createRoot } = ReactDOM;

        const taskReducer = (state, action) => {
          switch (action.type) {
            case 'ADD_TASK': return [...state, action.payload];
            case 'TOGGLE_TASK': return state.map(t => t.id === action.payload ? { ...t, completed: !t.completed } : t);
            case 'DELETE_TASK': return state.filter(t => t.id !== action.payload);
            default: return state;
          }
        };

        const AetherFlowApp = () => {
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [tasks, dispatchTasks] = useReducer(taskReducer, []);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [pomodoroMinutes, setPomodoroMinutes] = useState(25);
            const [pomodoroSeconds, setPomodoroSeconds] = useState(0);
            const [pomodoroActive, setPomodoroActive] = useState(false);
            const [newTask, setNewTask] = useState('');

            useEffect(() => {
                let interval = null;
                if (pomodoroActive) {
                    interval = setInterval(() => {
                        if (pomodoroSeconds === 0) {
                            if (pomodoroMinutes === 0) {
                                setPomodoroActive(false);
                                setPomodoroMinutes(25);
                            } else {
                                setPomodoroMinutes(m => m - 1);
                                setPomodoroSeconds(59);
                            }
                        } else {
                            setPomodoroSeconds(s => s - 1);
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [pomodoroActive, pomodoroMinutes, pomodoroSeconds]);

            // Manual Icon Helper (because of UMD loading)
            const Icon = ({name, ...props}) => {
                const LucideIcon = lucide.icons[name];
                return LucideIcon ? <div dangerouslySetInnerHTML={{ __html: lucide.createIcons() }} /> : null;
            };

            return (
                <div className={`min-h-screen max-w-md mx-auto flex flex-col ${isDarkMode ? 'bg-gray-900 text-white' : 'bg-white text-black shadow-2xl'}`}>
                    <div className="bg-indigo-600 p-1 text-center text-[10px] font-bold text-white uppercase tracking-tighter">
                        AetherFlow OS Engine Active
                    </div>

                    <header className="p-4 border-b border-gray-700 flex justify-between items-center">
                        <h1 className="font-black text-xl tracking-tighter italic">AETHERFLOW</h1>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 bg-gray-800 rounded-full">
                            {isDarkMode ? '☀️' : '🌙'}
                        </button>
                    </header>

                    <main className="flex-grow p-6">
                        <div className="bg-gray-800/50 p-8 rounded-[40px] border border-gray-700 text-center mb-6">
                            <span className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Focus Timer</span>
                            <div className="text-6xl font-black font-mono mt-2">
                                {String(pomodoroMinutes).padStart(2, '0')}:{String(pomodoroSeconds).padStart(2, '0')}
                            </div>
                        </div>

                        <div className="space-y-4">
                           <div className="flex gap-2">
                                <input 
                                    className="flex-grow bg-gray-800 border border-gray-700 p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all text-white"
                                    placeholder="Define your next win..."
                                    value={newTask}
                                    onChange={(e) => setNewTask(e.target.value)}
                                />
                                <button 
                                    onClick={() => {
                                        if(!newTask) return;
                                        dispatchTasks({type: 'ADD_TASK', payload: {id: Date.now(), text: newTask, completed: false}});
                                        setNewTask('');
                                    }}
                                    className="bg-indigo-600 px-6 rounded-2xl font-bold hover:bg-indigo-500 active:scale-90 transition-all"
                                >
                                    +
                                </button>
                           </div>
                           <div className="space-y-2">
                                {tasks.map(t => (
                                    <div key={t.id} className="bg-gray-800/30 p-4 rounded-2xl flex justify-between items-center border border-gray-800">
                                        <span className={t.completed ? 'line-through text-gray-500' : ''}>{t.text}</span>
                                        <button onClick={() => dispatchTasks({type: 'DELETE_TASK', payload: t.id})} className="text-red-500 font-bold px-2">X</button>
                                    </div>
                                ))}
                           </div>
                        </div>
                    </main>

                    <nav className="p-6 border-t border-gray-800 flex justify-center gap-4">
                        <button 
                            onClick={() => setPomodoroActive(!pomodoroActive)}
                            className={`px-12 py-4 rounded-full font-black tracking-widest transition-all ${pomodoroActive ? 'bg-red-500' : 'bg-indigo-600 shadow-lg shadow-indigo-500/20 hover:scale-105'}`}
                        >
                            {pomodoroActive ? 'PAUSE' : 'START FLOW'}
                        </button>
                    </nav>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<AetherFlowApp />);
    </script>
</body>
</html>
