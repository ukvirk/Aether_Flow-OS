<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow | Productivity OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Accessing Lucide Icons from the UMD bundle
        const { 
            Clock, Plus, Trash2, Check, Moon, Sun, Target, Calendar, Flame, Trophy, 
            PlayCircle, PauseCircle, RefreshCw, Zap, Settings, Heart, BarChart3, 
            BookOpen, Save, Users, Copy, Sparkles, X, CheckSquare, CheckCircle, CheckCircle2 
        } = lucideReact;

        const taskReducer = (state, action) => {
          switch (action.type) {
            case 'ADD_TASK': return [...state, action.payload];
            case 'TOGGLE_TASK': return state.map(t => t.id === action.payload ? { ...t, completed: !t.completed } : t);
            case 'DELETE_TASK': return state.filter(t => t.id !== action.payload);
            default: return state;
          }
        };

        const AetherFlowApp = () => {
            const [isDarkMode, setIsDarkMode] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [tasks, dispatchTasks] = React.useReducer(taskReducer, []);
            const [userProfile, setUserProfile] = React.useState({ streak: 7, totalPoints: 245, name: 'Warrior' });
            const [pomodoroMinutes, setPomodoroMinutes] = React.useState(25);
            const [pomodoroActive, setPomodoroActive] = React.useState(false);
            const [newTask, setNewTask] = React.useState('');

            // Simple Timer Logic [cite: 173]
            React.useEffect(() => {
                let interval;
                if (pomodoroActive && pomodoroMinutes > 0) {
                    interval = setInterval(() => setPomodoroMinutes(prev => prev - 1), 60000);
                }
                return () => clearInterval(interval);
            }, [pomodoroActive, pomodoroMinutes]);

            return (
                <div className={`min-h-screen max-w-md mx-auto flex flex-col ${isDarkMode ? 'bg-gray-900 text-white' : 'bg-white text-gray-900'}`}>
                    <header className="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-500 p-1.5 rounded-lg"><Zap size={20} className="text-white"/></div>
                            <h1 className="font-bold tracking-tight">AetherFlow</h1>
                        </div>
                        <div className="flex gap-3 text-xs">
                            <span className="flex items-center gap-1 text-yellow-400 font-bold"><Trophy size={14}/> {userProfile.totalPoints}</span>
                            <span className="flex items-center gap-1 text-red-500 font-bold"><Flame size={14}/> {userProfile.streak}d</span>
                        </div>
                    </header>

                    <main className="flex-grow p-4 pb-24 overflow-y-auto">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-gray-800/50 p-4 rounded-2xl border border-gray-700">
                                        <CheckCircle2 className="text-indigo-400 mb-2"/>
                                        <div className="text-2xl font-bold">{tasks.filter(t => t.completed).length}</div>
                                        <div className="text-xs text-gray-400 uppercase tracking-tighter">Tasks Done</div>
                                    </div>
                                    <div className="bg-gray-800/50 p-4 rounded-2xl border border-gray-700">
                                        <Flame className="text-red-400 mb-2"/>
                                        <div className="text-2xl font-bold">{userProfile.streak}</div>
                                        <div className="text-xs text-gray-400 uppercase tracking-tighter">Day Streak</div>
                                    </div>
                                </div>
                                <div className="p-6 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-700 shadow-xl">
                                    <h3 className="font-bold text-lg mb-1">Focus Session</h3>
                                    <p className="text-indigo-100 text-sm mb-4">You have {pomodoroMinutes} minutes left.</p>
                                    <button onClick={() => setActiveTab('focus')} className="bg-white text-indigo-600 px-4 py-2 rounded-lg text-sm font-bold shadow-lg">Open Timer</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tasks' && (
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                        placeholder="Add a new task..." 
                                        className="flex-1 bg-gray-800 border border-gray-700 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                    />
                                    <button 
                                        onClick={() => {
                                            if(newTask) dispatchTasks({type: 'ADD_TASK', payload: {id: Date.now(), text: newTask, completed: false}});
                                            setNewTask('');
                                        }}
                                        className="bg-indigo-600 p-3 rounded-xl hover:bg-indigo-500 transition"
                                    >
                                        <Plus />
                                    </button>
                                </div>
                                <div className="space-y-2">
                                    {tasks.map(t => (
                                        <div key={t.id} className="flex items-center justify-between bg-gray-800/40 p-4 rounded-xl border border-gray-700/50">
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => dispatchTasks({type: 'TOGGLE_TASK', payload: t.id})} className={`w-5 h-5 rounded-md border ${t.completed ? 'bg-green-500 border-green-500' : 'border-gray-500'}`}>
                                                    {t.completed && <Check size={14} className="text-white"/>}
                                                </button>
                                                <span className={t.completed ? 'line-through text-gray-500' : ''}>{t.text}</span>
                                            </div>
                                            <button onClick={() => dispatchTasks({type: 'DELETE_TASK', payload: t.id})} className="text-gray-500 hover:text-red-400"><Trash2 size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gray-900/80 backdrop-blur-lg border-t border-gray-800 p-2 flex justify-around items-center z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-xl transition ${activeTab === 'dashboard' ? 'text-indigo-400 bg-indigo-400/10' : 'text-gray-500'}`}><Calendar size={24}/></button>
                        <button onClick={() => setActiveTab('tasks')} className={`p-3 rounded-xl transition ${activeTab === 'tasks' ? 'text-indigo-400 bg-indigo-400/10' : 'text-gray-500'}`}><Target size={24}/></button>
                        <button onClick={() => setActiveTab('focus')} className={`p-3 rounded-xl transition ${activeTab === 'focus' ? 'text-indigo-400 bg-indigo-400/10' : 'text-gray-500'}`}><Clock size={24}/></button>
                        <button onClick={() => setActiveTab('settings')} className={`p-3 rounded-xl transition ${activeTab === 'settings' ? 'text-indigo-400 bg-indigo-400/10' : 'text-gray-500'}`}><Settings size={24}/></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AetherFlowApp />);
    </script>
</body>
</html>
