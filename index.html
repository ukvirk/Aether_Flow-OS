<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow OS | Productivity Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom": "https://esm.sh/react-dom@18/client",
            "lucide-react": "https://esm.sh/lucide-react@0.284.0"
        }
    }
    </script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useReducer } from 'react';
        import { createRoot } from 'react-dom';
        import { 
            Clock, Plus, Trash2, Check, Moon, Sun, Target, Calendar, Flame, Trophy, 
            PlayCircle, PauseCircle, RefreshCw, Zap, Settings, Heart, BarChart3, 
            BookOpen, Save, Users, Copy, Sparkles, X, CheckSquare, CheckCircle, CheckCircle2
        } from 'lucide-react';

        // --- DATA ARCHITECTURE ---
        const taskReducer = (state, action) => {
          switch (action.type) {
            case 'ADD_TASK': return [...state, action.payload];
            case 'TOGGLE_TASK': return state.map(t => t.id === action.payload ? { ...t, completed: !t.completed } : t);
            case 'DELETE_TASK': return state.filter(t => t.id !== action.payload);
            default: return state;
          }
        };

        const AetherFlowApp = () => {
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [tasks, dispatchTasks] = useReducer(taskReducer, []);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [pomodoroMinutes, setPomodoroMinutes] = useState(25);
            const [pomodoroSeconds, setPomodoroSeconds] = useState(0);
            const [pomodoroActive, setPomodoroActive] = useState(false);
            const [newTask, setNewTask] = useState('');

            // TIMER ENGINE
            useEffect(() => {
                let interval = null;
                if (pomodoroActive) {
                    interval = setInterval(() => {
                        if (pomodoroSeconds === 0) {
                            if (pomodoroMinutes === 0) {
                                setPomodoroActive(false);
                                alert("Session Complete!");
                                setPomodoroMinutes(25);
                            } else {
                                setPomodoroMinutes(m => m - 1);
                                setPomodoroSeconds(59);
                            }
                        } else {
                            setPomodoroSeconds(s => s - 1);
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [pomodoroActive, pomodoroMinutes, pomodoroSeconds]);

            return (
                <div className={`min-h-screen max-w-md mx-auto flex flex-col ${isDarkMode ? 'bg-gray-900 text-white' : 'bg-white text-black'}`}>
                    {/* TOP BANNER */}
                    <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-1 text-center text-[10px] font-bold">
                        🚀 AetherFlow v1.0 | 100% FREE FOREVER
                    </div>

                    <header className="p-4 border-b border-gray-700 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <Zap className="text-yellow-400" size={20} />
                            <h1 className="font-black tracking-tighter text-xl">AetherFlow</h1>
                        </div>
                        <button onClick={() => setIsDarkMode(!isDarkMode)}>
                            {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                        </button>
                    </header>

                    <main className="flex-grow p-4 overflow-y-auto">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-gray-800 p-6 rounded-3xl border border-gray-700 text-center">
                                    <h2 className="text-gray-400 text-xs uppercase tracking-widest mb-2">Focus Session</h2>
                                    <div className="text-6xl font-black font-mono">
                                        {String(pomodoroMinutes).padStart(2, '0')}:{String(pomodoroSeconds).padStart(2, '0')}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-indigo-900/50 p-4 rounded-2xl border border-indigo-500/30">
                                        <Trophy className="text-yellow-500 mb-2" />
                                        <div className="text-2xl font-bold">245</div>
                                        <div className="text-[10px] uppercase text-indigo-300">Total Points</div>
                                    </div>
                                    <div className="bg-red-900/50 p-4 rounded-2xl border border-red-500/30">
                                        <Flame className="text-orange-500 mb-2" />
                                        <div className="text-2xl font-bold">7d</div>
                                        <div className="text-[10px] uppercase text-red-300">Streak</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tasks' && (
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <input 
                                        className="flex-grow bg-gray-800 border border-gray-700 p-3 rounded-xl outline-none focus:border-indigo-500"
                                        placeholder="Add a new task..."
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                    />
                                    <button 
                                        onClick={() => {
                                            if(!newTask) return;
                                            dispatchTasks({type: 'ADD_TASK', payload: {id: Date.now(), text: newTask, completed: false}});
                                            setNewTask('');
                                        }}
                                        className="bg-indigo-600 px-4 rounded-xl"
                                    >
                                        <Plus />
                                    </button>
                                </div>
                                {tasks.map(t => (
                                    <div key={t.id} className="bg-gray-800 p-4 rounded-xl flex justify-between items-center animate-in slide-in-from-bottom-2">
                                        <span className={t.completed ? 'line-through text-gray-500' : ''}>{t.text}</span>
                                        <button onClick={() => dispatchTasks({type: 'DELETE_TASK', payload: t.id})}>
                                            <Trash2 size={16} className="text-red-500" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gray-800 border-t border-gray-700 p-4 flex justify-around shadow-2xl">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-indigo-400 scale-125 transition-all' : 'text-gray-500'}><Calendar /></button>
                        <button onClick={() => setActiveTab('tasks')} className={activeTab === 'tasks' ? 'text-indigo-400 scale-125 transition-all' : 'text-gray-500'}><Target /></button>
                        <button onClick={() => setPomodoroActive(!pomodoroActive)} className="bg-indigo-600 p-3 rounded-full -mt-10 border-4 border-gray-900 shadow-lg active:scale-90 transition-all">
                            {pomodoroActive ? <PauseCircle /> : <PlayCircle />}
                        </button>
                        <button onClick={() => setActiveTab('habits')} className="text-gray-500"><Heart /></button>
                        <button onClick={() => setActiveTab('settings')} className="text-gray-500"><Settings /></button>
                    </nav>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<AetherFlowApp />);
    </script>
</body>
</html>
