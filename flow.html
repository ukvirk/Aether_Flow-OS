<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow OS | Productivity</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        // Link React from the Global Window
        const { useState, useEffect, useReducer } = React;

        const taskReducer = (state, action) => {
            switch (action.type) {
                case 'ADD_TASK': return [...state, action.payload];
                case 'DELETE_TASK': return state.filter(t => t.id !== action.payload);
                case 'TOGGLE_TASK': return state.map(t => t.id === action.payload ? {...t, completed: !t.completed} : t);
                default: return state;
            }
        };

        const AetherFlowApp = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [tasks, dispatchTasks] = useReducer(taskReducer, []);
            const [newTask, setNewTask] = useState('');
            const [isDarkMode] = useState(true);

            const addTask = (e) => {
                e.preventDefault();
                if (!newTask.trim()) return;
                dispatchTasks({ type: 'ADD_TASK', payload: { id: Date.now(), text: newTask, completed: false } });
                setNewTask('');
            };

            return (
                <div className="min-h-screen flex flex-col max-w-lg mx-auto w-full bg-gray-900 text-white font-sans shadow-2xl">
                    {/* BANNER [cite: 129] */}
                    <div className="bg-gradient-to-r from-green-500 to-blue-600 py-2 px-4 text-center text-[10px] font-bold uppercase tracking-tighter">
                        🚀 AetherFlow: 100% Free Forever • No Limits
                    </div>

                    <header className="flex items-center justify-between p-6 border-b border-gray-800 bg-gray-800/50 backdrop-blur-md">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <span className="font-black text-white italic">A</span>
                            </div>
                            <h1 className="text-lg font-bold tracking-tighter">AETHER<span className="text-indigo-400">FLOW</span></h1>
                        </div>
                    </header>

                    <main className="flex-grow p-6 overflow-y-auto pb-32">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="bg-gray-800/50 p-6 rounded-2xl border border-gray-700 shadow-xl">
                                    <h2 className="text-gray-400 text-xs font-bold uppercase tracking-widest mb-4">Focus Statistics</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-indigo-900/30 p-4 rounded-xl border border-indigo-500/20 text-center">
                                            <div className="text-3xl font-black text-indigo-400">{tasks.filter(t => t.completed).length}</div>
                                            <div className="text-[10px] uppercase text-gray-500 font-bold">Tasks Completed</div>
                                        </div>
                                        <div className="bg-emerald-900/30 p-4 rounded-xl border border-emerald-500/20 text-center">
                                            <div className="text-3xl font-black text-emerald-400">7d</div>
                                            <div className="text-[10px] uppercase text-gray-500 font-bold">Current Streak</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tasks' && (
                            <div className="space-y-6">
                                <form onSubmit={addTask} className="relative group">
                                    <input 
                                        type="text" 
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                        placeholder="Add a high-impact task..."
                                        className="w-full bg-gray-800 border-2 border-gray-700 rounded-2xl p-4 text-sm focus:border-indigo-500 focus:outline-none transition-all shadow-lg"
                                    />
                                    <button type="submit" className="absolute right-2 top-2 bg-indigo-600 hover:bg-indigo-500 p-2 px-4 rounded-xl text-xs font-bold transition-all">
                                        ADD
                                    </button>
                                </form>

                                <div className="space-y-3">
                                    {tasks.map(task => (
                                        <div key={task.id} className="flex items-center justify-between bg-gray-800/40 p-4 rounded-2xl border border-gray-700 hover:border-gray-600 transition-all">
                                            <span className={`text-sm ${task.completed ? 'line-through text-gray-500' : 'text-white font-medium'}`}>{task.text}</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => dispatchTasks({type: 'TOGGLE_TASK', payload: task.id})} className="p-2 hover:text-green-400"><CheckCircle size={18}/></button>
                                                <button onClick={() => dispatchTasks({type: 'DELETE_TASK', payload: task.id})} className="p-2 hover:text-red-400"><Trash2 size={18}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-gray-800/80 backdrop-blur-xl border border-white/10 rounded-3xl p-2 flex justify-around shadow-2xl z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-4 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-gray-500'}`}>
                            <LayoutDashboard size={20}/>
                        </button>
                        <button onClick={() => setActiveTab('tasks')} className={`p-4 rounded-2xl transition-all ${activeTab === 'tasks' ? 'bg-indigo-600 text-white' : 'text-gray-500'}`}>
                            <Target size={20}/>
                        </button>
                        <button onClick={() => setActiveTab('focus')} className={`p-4 rounded-2xl transition-all ${activeTab === 'focus' ? 'bg-indigo-600 text-white' : 'text-gray-500'}`}>
                            <Timer size={20}/>
                        </button>
                    </nav>
                </div>
            );
        };

        // Initialize Lucide Icons after React Renders
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AetherFlowApp />);
    </script>
</body>
</html>
